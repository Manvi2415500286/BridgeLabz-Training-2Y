{% extends 'base.html' %}
{% block title %}Login — TradeHub{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 24px">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:40px;margin-bottom:12px">🔐</div>
      <h1 style="font-size:28px;font-weight:800">Welcome Back</h1>
      <p class="text-muted">Sign in to your TradeHub account</p>
    </div>
    <div class="card">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        {% if form.errors %}
        <div class="alert alert-error">Invalid username or password.</div>
        {% endif %}
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:16px;padding:12px">Sign In</button>
      </form>
      <div class="divider"></div>
      <p style="text-align:center;color:var(--muted);font-size:14px">
        No account? <a href="{% url 'register' %}" style="color:var(--accent)">Create one free</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
